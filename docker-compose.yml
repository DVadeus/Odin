services:

  postgres:
    image: postgres:16
    container_name: odin_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: odin
      POSTGRES_USER: odin
      POSTGRES_PASSWORD: odinpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:8
    container_name: odin_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: odin_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: odin
      MINIO_ROOT_PASSWORD: odinpassword
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  django:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    container_name: odin_django
    restart: unless-stopped
    command: uv run python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - minio

  celery:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    container_name: odin_celery
    restart: unless-stopped
    command: uv run celery -A config worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

  celery-beat:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    container_name: odin_celery_beat
    restart: unless-stopped
    command: uv run celery -A config beat -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

volumes:
  postgres_data:
  minio_data: